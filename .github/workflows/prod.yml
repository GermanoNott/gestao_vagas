name: Gestao de Vagas Application

on:
    push:
        branches: [main]

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v3
            - name: Setup Java
              uses: actions/setup-java@v3
              with:
                  distribution: temurin
                  java-version: 17
            - name: Build Project
              run: mvn clean install
            - name: Login docker
              run: docker login -u ${{secrets.DOCKER_USERNAME}} -p ${{secrets.DOCKER_PASSWORD}}
            - name: Build docker image
              run: docker build -t germanott/gestao_vagas .
            - name: Publish image
              run: docker push germanott/gestao_vagas

    deploy:
        needs: build
        runs-on: self-hosted
        steps:
            - name: Pull image docker hub
              run: docker pull germanott/gestao_vagas:latest
            - name: remove container
              run: docker rm -f gestao-vagas
            - name: Run docker container gestao-vagas
              run: docker run -d -p 8080:8080 -e DATABASE_URL=jdbc:postgres://gestao-vagas-db.c3we02qwymx9.us-east-2.rds.amazonaws.com:5432/gestao_vagas_db -e DATABASE_PASSWORD=dev12345 -e DATABASE_USERNAME=gestaovagas --name gestao-vagas germanott/gestao_vagas
